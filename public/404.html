<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>ServiceGTD</title>
    <script>
      // SPA redirect for GitHub Pages
      var path = window.location.pathname;
      var repo = '/serviceGTD-app';
      if (path.startsWith(repo)) {
        var route = path.slice(repo.length) || '/';
        sessionStorage.setItem('redirect', route + window.location.search + window.location.hash);
      }
      window.location.replace(repo + '/');
    </script>
  </head>
  <body></body>
</html>
